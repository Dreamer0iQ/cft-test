services:
  postgres:
    image: postgres:16-alpine
    container_name: cft-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cft
    ports:
      - "5433:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cft"]
      interval: 3s
      timeout: 3s
      retries: 20

  app:
    build: .
    container_name: cft-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cft
      NEXTAUTH_SECRET: dev-secret-replace-me
      NEXTAUTH_URL: http://localhost:3001
      RUN_SEED: "true"
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
